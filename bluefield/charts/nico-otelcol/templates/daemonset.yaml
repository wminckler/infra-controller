apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "nico-otelcol.fullname" . }}
  labels:
    {{- include "nico-otelcol.labels" . | nindent 4 }}
    {{- with .Values.serviceDaemonSet.labels }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
  annotations:
    {{- with .Values.serviceDaemonSet.annotations }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- with .Values.serviceDaemonSet.updateStrategy }}
  updateStrategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "nico-otelcol.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- with .Values.serviceDaemonSet.annotations }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "nico-otelcol.selectorLabels" . | nindent 8 }}
        {{- with .Values.serviceDaemonSet.labels }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      {{- if not (empty .Values.serviceDaemonSet.nodeSelector) }}
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
              {{- toYaml .Values.serviceDaemonSet.nodeSelector | nindent 12 }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: otelcol-contrib
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/etc/otelcol-contrib/otelcol-wrapper"]
          {{- with toYaml .Values.serviceDaemonSet.resources }}
          resources:
            limits:
              {{- . | nindent 14 }}
            requests:
              {{- . | nindent 14 }}
          {{- end }}
          env:
            - name: NICO_DPU_AGENT_METRICS_TARGET
              value: carbide-dpf-cluster-{{ .Values.nico_dpu_agent }}.dpf-operator-system.svc.cluster.local:8888
            - name: NICO_FMDS_METRICS_TARGET
              value: carbide-dpf-cluster-{{ .Values.nico_fmds }}.dpf-operator-system.svc.cluster.local:8888
            - name: NICO_DTS_METRICS_TARGET
              value: carbide-dpf-cluster-{{ .Values.nico_dts }}-doca-telemetry.dpf-operator-system.svc.cluster.local:9189
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          volumeMounts:
            - name: config
              mountPath: /etc/otelcol-contrib/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: journal
              mountPath: /var/log/journal
              readOnly: true
            - name: doca-logs
              mountPath: /var/log/doca
              readOnly: true
            - name: auth-log
              mountPath: /var/log/auth.log
              readOnly: true
            - name: nico-certs
              mountPath: {{ .Values.certsDir | default "/opt/nico" }}
              readOnly: true
            - name: machine-id
              mountPath: /run/otelcol-contrib
            - name: cursors
              mountPath: /var/lib/otelcol-contrib/cursors
            - name: config-fragments
              mountPath: /etc/otelcol-contrib/config-fragments
              readOnly: true
        - name: node-exporter
          image: "{{ .Values.nodeExporter.image.repository }}:{{ .Values.nodeExporter.image.tag }}"
          imagePullPolicy: {{ .Values.nodeExporter.image.pullPolicy }}
          args:
            # Bind to loopback only: the collector scrapes localhost:{{ .Values.nodeExporter.port }}
            # from within this (hostNetwork) pod, and we don't want node-exporter
            # reachable on the host's external interfaces.
            - --web.listen-address=127.0.0.1:{{ .Values.nodeExporter.port }}
            - --path.procfs=/host/proc
            - --path.sysfs=/host/sys
            - --path.rootfs=/host/root
            - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|run|var/lib/kubelet/.+)($|/)
          {{- with .Values.nodeExporter.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: host-proc
              mountPath: /host/proc
              readOnly: true
            - name: host-sys
              mountPath: /host/sys
              readOnly: true
            - name: host-root
              mountPath: /host/root
              mountPropagation: HostToContainer
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: {{ include "nico-otelcol.fullname" . }}-config
        - name: journal
          hostPath:
            path: /var/log/journal
            type: DirectoryOrCreate
        - name: doca-logs
          hostPath:
            path: /var/log/doca
            type: DirectoryOrCreate
        - name: auth-log
          hostPath:
            path: /var/log/auth.log
            type: FileOrCreate
        - name: nico-certs
          hostPath:
            path: {{ .Values.certsDir | default "/opt/nico" }}
            type: DirectoryOrCreate
        - name: machine-id
          hostPath:
            path: /run/otelcol-contrib
            type: DirectoryOrCreate
        - name: cursors
          hostPath:
            path: /var/lib/otelcol-contrib/cursors
            type: DirectoryOrCreate
        - name: config-fragments
          hostPath:
            path: /etc/otelcol-contrib/config-fragments
            type: DirectoryOrCreate
        - name: host-proc
          hostPath:
            path: /proc
        - name: host-sys
          hostPath:
            path: /sys
        - name: host-root
          hostPath:
            path: /
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
