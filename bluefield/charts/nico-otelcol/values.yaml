### DPF contract ###
serviceDaemonSet:
  nodeSelector:
  labels: {}
  annotations: {}
  updateStrategy: {}
  resources: {}
exposedPorts:
  labels: {}
  ports: {}

### Cert directory + root CA filename overrides.
certsDir: /opt/forge
rootCaFile: forge_root.pem

### Service specific values ###
# Prometheus receiver port; must match DPUServiceConfiguration configPorts (dpf_services).
prometheusPort: 9999
# Host:port for prometheus scrape targets (see otel_config.yaml). DPF sets these via nico-api.
nico_dpu_agent: ""
nico_fmds: ""
nico_dts: ""
image:
  repository: ""
  pullPolicy: IfNotPresent
  tag: ""
# node-exporter sidecar: provides the host metrics scraped by the
# prometheus/node receiver in otel_config.yaml at localhost:<port>.
# It binds to loopback only, so it is never exposed on the host's external
# interfaces. Pinned public multi-arch image (includes arm64 for BlueField).
nodeExporter:
  image:
    repository: quay.io/prometheus/node-exporter
    tag: v1.9.1
    pullPolicy: IfNotPresent
  # Must match the prometheus/node scrape target (localhost:9200) in otel_config.yaml.
  port: 9200
  resources: {}
imagePullSecrets: []
podSecurityContext: {}
securityContext:
  privileged: true
  runAsUser: 0
  runAsGroup: 0
  capabilities:
    add:
      - NET_ADMIN
      - NET_RAW
      - NET_BIND_SERVICE
tolerations: []
