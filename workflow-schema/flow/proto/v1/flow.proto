syntax = "proto3";

package v1;

import "google/protobuf/empty.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/NVIDIA/infra-controller-rest/workflow-schema/flow";

service Flow {
    // Version
    rpc Version(VersionRequest) returns (BuildInfo);

    // Task schedules
    rpc CreateTaskSchedule(CreateTaskScheduleRequest) returns (TaskSchedule);
    rpc GetTaskSchedule(GetTaskScheduleRequest) returns (TaskSchedule);
    rpc ListTaskSchedules(ListTaskSchedulesRequest) returns (ListTaskSchedulesResponse);
    rpc UpdateTaskSchedule(UpdateTaskScheduleRequest) returns (TaskSchedule);
    rpc PauseTaskSchedule(PauseTaskScheduleRequest) returns (TaskSchedule);
    rpc ResumeTaskSchedule(ResumeTaskScheduleRequest) returns (TaskSchedule);
    rpc DeleteTaskSchedule(DeleteTaskScheduleRequest) returns (google.protobuf.Empty);
    rpc TriggerTaskSchedule(TriggerTaskScheduleRequest) returns (SubmitTaskResponse);
    rpc AddTaskScheduleScope(AddTaskScheduleScopeRequest) returns (AddTaskScheduleScopeResponse);       // add one or more racks to a schedule's scope
    rpc RemoveTaskScheduleScope(RemoveTaskScheduleScopeRequest) returns (google.protobuf.Empty);        // remove a single rack from a schedule's scope by scope ID
    rpc UpdateTaskScheduleScope(UpdateTaskScheduleScopeRequest) returns (UpdateTaskScheduleScopeResponse); // reconcile the full scope against a desired target_spec
    rpc ListTaskScheduleScopes(ListTaskScheduleScopesRequest) returns (ListTaskScheduleScopesResponse); // list all racks in a schedule's scope
    rpc CheckScheduleConflicts(CheckScheduleConflictsRequest) returns (CheckScheduleConflictsResponse); // advisory: returns existing schedules that may conflict with a proposed operation

    // Rack CRUD
    rpc CreateExpectedRack(CreateExpectedRackRequest) returns (CreateExpectedRackResponse);
    rpc GetRackInfoByID(GetRackInfoByIDRequest) returns (GetRackInfoResponse);
    rpc GetRackInfoBySerial(GetRackInfoBySerialRequest) returns (GetRackInfoResponse);
    rpc GetListOfRacks(GetListOfRacksRequest) returns (GetListOfRacksResponse);
    rpc PatchRack(PatchRackRequest) returns (PatchRackResponse);
    rpc DeleteRack(DeleteRackRequest) returns (DeleteRackResponse);
    rpc PurgeRack(PurgeRackRequest) returns (PurgeRackResponse);

    // Rack operations
    rpc UpgradeFirmware(UpgradeFirmwareRequest) returns (SubmitTaskResponse);
    rpc BringUpRack(BringUpRackRequest) returns (SubmitTaskResponse);
    rpc IngestRack(IngestRackRequest) returns (SubmitTaskResponse);
    rpc PowerOnRack(PowerOnRackRequest) returns (SubmitTaskResponse);
    rpc PowerOffRack(PowerOffRackRequest) returns (SubmitTaskResponse);
    rpc PowerResetRack(PowerResetRackRequest) returns (SubmitTaskResponse);

    // Component CRUD
    rpc GetComponentInfoByID(GetComponentInfoByIDRequest) returns (GetComponentInfoResponse);
    rpc GetComponentInfoBySerial(GetComponentInfoBySerialRequest) returns (GetComponentInfoResponse);
    rpc GetComponents(GetComponentsRequest) returns (GetComponentsResponse);
    rpc ValidateComponents(ValidateComponentsRequest) returns (ValidateComponentsResponse);
    rpc AddComponent(AddComponentRequest) returns (AddComponentResponse);
    rpc PatchComponent(PatchComponentRequest) returns (PatchComponentResponse);
    rpc DeleteComponent(DeleteComponentRequest) returns (DeleteComponentResponse);
    rpc PurgeComponent(PurgeComponentRequest) returns (PurgeComponentResponse);

    // NVL Domain
    rpc CreateNVLDomain(CreateNVLDomainRequest) returns (CreateNVLDomainResponse);
    rpc AttachRacksToNVLDomain(AttachRacksToNVLDomainRequest) returns (google.protobuf.Empty);
    rpc DetachRacksFromNVLDomain(DetachRacksFromNVLDomainRequest) returns (google.protobuf.Empty);
    rpc GetListOfNVLDomains(GetListOfNVLDomainsRequest) returns (GetListOfNVLDomainsResponse);
    rpc GetRacksForNVLDomain(GetRacksForNVLDomainRequest) returns (GetRacksForNVLDomainResponse);

    // Tasks
    rpc ListTasks(ListTasksRequest) returns (ListTasksResponse);
    rpc GetTasksByIDs(GetTasksByIDsRequest) returns (GetTasksByIDsResponse);
    rpc CancelTask(CancelTaskRequest) returns (CancelTaskResponse);

    // Operation rules
    rpc CreateOperationRule(CreateOperationRuleRequest) returns (CreateOperationRuleResponse);
    rpc UpdateOperationRule(UpdateOperationRuleRequest) returns (google.protobuf.Empty);
    rpc DeleteOperationRule(DeleteOperationRuleRequest) returns (google.protobuf.Empty);
    rpc GetOperationRule(GetOperationRuleRequest) returns (OperationRule);
    rpc ListOperationRules(ListOperationRulesRequest) returns (ListOperationRulesResponse);
    rpc SetRuleAsDefault(SetRuleAsDefaultRequest) returns (google.protobuf.Empty);

    // Rack-rule associations
    rpc AssociateRuleWithRack(AssociateRuleWithRackRequest) returns (google.protobuf.Empty);
    rpc DisassociateRuleFromRack(DisassociateRuleFromRackRequest) returns (google.protobuf.Empty);
    rpc GetRackRuleAssociation(GetRackRuleAssociationRequest) returns (GetRackRuleAssociationResponse);
    rpc ListRackRuleAssociations(ListRackRuleAssociationsRequest) returns (ListRackRuleAssociationsResponse);
}

message UUID {
    string id = 1;
}

message DeviceInfo {
    UUID id = 1;
    string name = 2;
    string manufacturer = 3;
    optional string model = 4;
    string serial_number = 5;
    optional string description = 6;
}

message Location {
    string region = 1;
    string datacenter = 2;
    string room = 3;
    string position = 4;
}

message DeviceSerialInfo {
    string manufacturer = 1;
    string serial_number = 2;
}

enum BMCType {
    BMC_TYPE_UNKNOWN = 0;
    BMC_TYPE_HOST = 1;
    BMC_TYPE_DPU = 2;
}

message BMCInfo {
    BMCType type = 1;
    string mac_address = 2;
    optional string ip_address = 3;
}

message RackPosition {
    int32 slot_id = 1;
    int32 tray_idx = 2;
    int32 host_id = 3; 
}

enum ComponentType {
    COMPONENT_TYPE_UNKNOWN = 0;
    COMPONENT_TYPE_COMPUTE = 1;
    COMPONENT_TYPE_NVLSWITCH = 2;
    COMPONENT_TYPE_POWERSHELF = 3;
    COMPONENT_TYPE_TORSWITCH = 4;
    COMPONENT_TYPE_UMS = 5;
    COMPONENT_TYPE_CDU = 6;
}

// RackFilterField represents the supported filter field types for rack queries
enum RackFilterField {
    RACK_FILTER_FIELD_UNSPECIFIED = 0;
    RACK_FILTER_FIELD_NAME = 1;           // Filter by rack name
    RACK_FILTER_FIELD_MANUFACTURER = 2;   // Filter by manufacturer
    RACK_FILTER_FIELD_MODEL = 3;          // Filter by model (stored in description JSONB)
}

// ComponentFilterField represents the supported filter field types for component queries
enum ComponentFilterField {
    COMPONENT_FILTER_FIELD_UNSPECIFIED = 0;
    COMPONENT_FILTER_FIELD_NAME = 1;           // Filter by component name
    COMPONENT_FILTER_FIELD_MANUFACTURER = 2;   // Filter by manufacturer
    COMPONENT_FILTER_FIELD_MODEL = 3;          // Filter by model (stored in description JSONB)
    COMPONENT_FILTER_FIELD_TYPE = 4;           // Filter by component type (use ComponentType enum string values in StringQueryInfo)
}

// ComponentOrderByField represents the supported order by field types for component queries
enum ComponentOrderByField {
    COMPONENT_ORDER_BY_FIELD_UNSPECIFIED = 0;
    COMPONENT_ORDER_BY_FIELD_NAME = 1;         // Order by component name
    COMPONENT_ORDER_BY_FIELD_MANUFACTURER = 2; // Order by manufacturer
    COMPONENT_ORDER_BY_FIELD_MODEL = 3;        // Order by model
    COMPONENT_ORDER_BY_FIELD_TYPE = 4;         // Order by component type
}

// RackOrderByField represents the supported order by field types for rack queries
enum RackOrderByField {
    RACK_ORDER_BY_FIELD_UNSPECIFIED = 0;
    RACK_ORDER_BY_FIELD_NAME = 1;              // Order by rack name
    RACK_ORDER_BY_FIELD_MANUFACTURER = 2;      // Order by manufacturer
    RACK_ORDER_BY_FIELD_MODEL = 3;             // Order by model
}

enum PowerControlOp {
    POWER_CONTROL_OP_UNKNOWN = 0;
    // Power On
    POWER_CONTROL_OP_ON = 1;
    POWER_CONTROL_OP_FORCE_ON = 2;
    // Power Off
    POWER_CONTROL_OP_OFF = 3;            // graceful shutdown
    POWER_CONTROL_OP_FORCE_OFF = 4;
    // Restart (OS level reboot)
    POWER_CONTROL_OP_RESTART = 5;        // graceful restart
    POWER_CONTROL_OP_FORCE_RESTART = 6;
    // Reset (hardware level)
    POWER_CONTROL_OP_WARM_RESET = 7;
    POWER_CONTROL_OP_COLD_RESET = 8;
}

enum TaskStatus {
    TASK_STATUS_UNKNOWN = 0;
    TASK_STATUS_PENDING = 1;
    TASK_STATUS_RUNNING = 2;
    TASK_STATUS_COMPLETED = 3;
    TASK_STATUS_FAILED = 4;
    TASK_STATUS_TERMINATED = 5;
    // TASK_STATUS_WAITING means the task was queued because a conflicting task
    // is active on the rack. It will be promoted automatically when the rack
    // becomes available, or can be cancelled explicitly via CancelTask.
    TASK_STATUS_WAITING = 6;
}

enum TaskExecutorType {
    TASK_EXECUTOR_TYPE_UNKNOWN = 0;
    TASK_EXECUTOR_TYPE_TEMPORAL = 1;
}

message Component {
    ComponentType type = 1;
    DeviceInfo info = 2;
    string firmware_version = 3;
    RackPosition position = 4;
    repeated BMCInfo bmcs = 5;
    string component_id = 6;  // Component's own ID from its source system (e.g., NICo machine_id for Compute)
    UUID rack_id = 7;
    string power_state = 8;  // Current power state (synced from external system by inventory loop)
}

message Rack {
    DeviceInfo info = 1;
    Location location = 2;
    repeated Component components = 3;
}

message Identifier {
    UUID id = 1;
    string name = 2;
}

// OperationTargetSpec contains targets for an operation.
// Supports either rack-level targeting (with optional type filtering)
// or component-level targeting (by UUID or external reference), but not both.
message OperationTargetSpec {
    oneof targets {
        RackTargets racks = 1;
        ComponentTargets components = 2;
    }
}

// RackTargets contains one or more rack targets
message RackTargets {
    repeated RackTarget targets = 1;
}

// ComponentTargets contains one or more component targets
message ComponentTargets {
    repeated ComponentTarget targets = 1;
}

// ComponentTypes contains one or more component type filters
message ComponentTypes {
    repeated ComponentType types = 1;
}

// RackTarget identifies a rack and optionally filters by component type.
// To target specific components, use the component-level APIs instead.
message RackTarget {
    oneof identifier {
        UUID id = 1;        // Rack UUID
        string name = 2;    // Rack name
    }
    // Optional: filter by component type. Omit (or send empty list) to include all components in the rack.
    repeated ComponentType component_types = 3;
}

// ComponentTarget identifies a specific component
message ComponentTarget {
    oneof identifier {
        UUID id = 1;           // Component UUID
        ExternalRef external = 2;  // External system reference
    }
}

// ExternalRef identifies a component by its external system ID.
// The component type determines which external system to query
// (e.g., COMPUTE -> NICo, POWERSHELF -> PSM)
message ExternalRef {
    ComponentType type = 1;  // Component type determines the source system
    string id = 2;           // ID in that system (e.g., NICo machine_id, PSM PMC MAC)
}

message NVLDomain {
    Identifier identifier = 1;
}

message Pagination {
    int32 offset = 1;
    int32 limit = 2;
}

message StringQueryInfo {
    repeated string patterns = 1;
    bool is_wildcard = 2;
    bool use_or = 3;
}

// Filter represents a single filter condition
message Filter {
    oneof field {
        RackFilterField rack_field = 1;           // For rack queries
        ComponentFilterField component_field = 2;  // For component queries
    }
    StringQueryInfo query_info = 3;
}

// OrderBy represents ordering specification
message OrderBy {
    oneof field {
        RackOrderByField rack_field = 1;           // For rack queries
        ComponentOrderByField component_field = 2; // For component queries
    }
    string direction = 3;  // ASC or DESC
}

message Task {
    UUID id = 1;
    string operation = 2;
    UUID rack_id = 3;
    repeated UUID component_uuids = 4;
    string description = 5;
    TaskExecutorType executor_type = 6;
    string execution_id = 7;
    TaskStatus status = 8;
    string message = 9;
    // queue_expires_at is set only for waiting tasks; absent for all other statuses.
    optional google.protobuf.Timestamp queue_expires_at = 10;
    google.protobuf.Timestamp created_at = 11;
    optional google.protobuf.Timestamp finished_at = 12;
    optional UUID applied_rule_id = 13;
    google.protobuf.Timestamp updated_at = 14;
    optional google.protobuf.Timestamp started_at = 15;
}

message CreateExpectedRackRequest {
    Rack rack = 1;
}

message CreateExpectedRackResponse {
    UUID id = 1;
}

message GetRackInfoByIDRequest {
    UUID id = 1;
    bool with_components = 2;
}

message GetRackInfoBySerialRequest {
    DeviceSerialInfo serial_info = 1;
    bool with_components = 2;
}

message GetRackInfoResponse {
    Rack rack = 1;
}

message PatchRackRequest {
    Rack rack = 1;
}

message PatchRackResponse {
    string report = 1;
}

message GetComponentInfoByIDRequest {
    UUID id = 1;
    bool with_rack = 2;
}

message GetComponentInfoBySerialRequest {
    DeviceSerialInfo serial_info = 1;
    bool with_rack = 2;
}

message GetComponentInfoResponse {
    Component component = 1;
    Rack rack = 2;
}

message GetListOfRacksRequest {
    repeated Filter filters = 1;  // Filter conditions for rack queries
    bool with_components = 2;
    optional Pagination pagination = 3;
    optional OrderBy order_by = 4;
}

message GetListOfRacksResponse {
    repeated Rack racks = 1;
    int32 total = 2;
}

message CreateNVLDomainRequest {
    NVLDomain nvl_domain = 1;
}

message CreateNVLDomainResponse {
    UUID id = 1;
}

message AttachRacksToNVLDomainRequest {
    Identifier nvl_domain_identifier = 1;
    repeated Identifier rack_identifiers = 2;
}

message DetachRacksFromNVLDomainRequest {
    repeated Identifier rack_identifiers = 1;
}

message GetListOfNVLDomainsRequest {
    StringQueryInfo info = 1;
    optional Pagination pagination = 2;
}

message GetListOfNVLDomainsResponse {
    repeated NVLDomain nvl_domains = 1;
    int32 total = 2;
}

message GetRacksForNVLDomainRequest {
    Identifier nvl_domain_identifier = 1;
}

message GetRacksForNVLDomainResponse {
    repeated Rack racks = 1;
}

message UpgradeFirmwareRequest {
    OperationTargetSpec target_spec = 1;                // required: identifies components to upgrade
    optional string target_version = 2;                 // optional: target firmware version
    optional google.protobuf.Timestamp start_time = 3;  // optional: scheduled start time
    optional google.protobuf.Timestamp end_time = 4;    // optional: scheduled end time
    string description = 5;                             // optional: task description
    optional QueueOptions queue_options = 6;
    optional UUID rule_id = 7;                          // optional: override rule resolution with a specific rule
}

// GetComponents - retrieves components from local database
message GetComponentsRequest {
    optional OperationTargetSpec target_spec = 1;   // Optional: Flexible targeting: rack(s) with optional type filter, or specific components. If not provided, queries all components.
    repeated Filter filters = 2;  // Filter conditions for component queries
    optional Pagination pagination = 3;
    optional OrderBy order_by = 4;
}

message GetComponentsResponse {
    repeated Component components = 1;
    int32 total = 2;
}

message ValidateComponentsRequest {
    optional OperationTargetSpec target_spec = 1;   // Optional: Flexible targeting: rack(s) with optional type filter, or specific components. If not provided, returns all drifts.
    repeated Filter filters = 2;           // Filter conditions for component queries
    optional Pagination pagination = 3;
    optional OrderBy order_by = 4;
}

message ValidateComponentsResponse {
    repeated ComponentDiff diffs = 1;
    int32 total_diffs = 2;
    
    // Summary counts
    int32 missing_count = 3;     // Expected by Flow but not found in the component manager service
    int32 unexpected_count = 4;  // Found in the component manager service but not expected by Flow
    int32 drift_count = 5;
    int32 match_count = 6;
}

enum DiffType {
    DIFF_TYPE_UNKNOWN = 0;
    DIFF_TYPE_MISSING = 1;       // Expected by Flow but not found in the component manager service
    DIFF_TYPE_UNEXPECTED = 2;    // Found in the component manager service but not expected by Flow
    DIFF_TYPE_DRIFT = 3;         // In both but with field differences
}

message ComponentDiff {
    DiffType type = 1;
    string component_id = 2;    // Component ID assigned by the component manager service
    Component expected = 3;     // Populated when type is MISSING
    Component actual = 4;
    repeated FieldDiff field_diffs = 5; // Populated when type is DRIFT
    UUID id = 6;                // Flow internal component UUID
}

message FieldDiff {
    string field_name = 1;      // e.g., "position.slot_id", "firmware_version"
    string expected_value = 2;
    string actual_value = 3;
}

// AddComponent - add a single component to an existing rack
message AddComponentRequest {
    Component component = 1;              // Required: the component to add; component.rack_id must be set
}

message AddComponentResponse {
    Component component = 1;  // The created component
}

// DeleteComponent - soft-delete a single component by UUID
message DeleteComponentRequest {
    UUID id = 1;  // Required: component UUID to delete
}

message DeleteComponentResponse {}

// DeleteRack - soft-delete a rack and cascade to its components
message DeleteRackRequest {
    UUID id = 1;  // Required: rack UUID to soft-delete
}

message DeleteRackResponse {}

// PurgeRack - permanently remove a soft-deleted rack and its components
message PurgeRackRequest {
    UUID id = 1;  // Required: rack UUID to purge (must already be soft-deleted)
}

message PurgeRackResponse {}

// PurgeComponent - permanently remove a soft-deleted component
message PurgeComponentRequest {
    UUID id = 1;  // Required: component UUID to purge (must already be soft-deleted)
}

message PurgeComponentResponse {}

// PatchComponent - update a single component's fields
message PatchComponentRequest {
    UUID id = 1;                          // Required: component UUID
    optional string firmware_version = 2; // Update firmware version
    optional RackPosition position = 3;   // Update slot_id, tray_idx, host_id
    optional string description = 4;      // Update description (JSON string)
    optional UUID rack_id = 5;            // Re-assign to a different rack
    repeated BMCInfo bmcs = 6;            // Update BMCs (matched by MAC address; create if new)
}

message PatchComponentResponse {
    Component component = 1;  // The updated component
}

message SubmitTaskResponse {
    repeated UUID task_ids = 1;  // Multiple task IDs (1 task per rack)
}

// ConflictStrategy controls how a task behaves when a conflict is detected.
enum ConflictStrategy {
    // CONFLICT_STRATEGY_UNSPECIFIED defaults to REJECT.
    // Wire value 0 preserves backward compatibility with the former bool false (reject).
    CONFLICT_STRATEGY_UNSPECIFIED = 0;
    // CONFLICT_STRATEGY_QUEUE queues the task until the conflicting task completes.
    // Wire value 1 preserves backward compatibility with the former bool true (queue).
    CONFLICT_STRATEGY_QUEUE = 1;
    // CONFLICT_STRATEGY_REJECT immediately rejects the task when a conflict is detected.
    CONFLICT_STRATEGY_REJECT = 2;
}

// QueueOptions controls how a task behaves when a conflict is detected.
message QueueOptions {
    // How to handle the task when a conflict is detected.
    // Defaults to CONFLICT_STRATEGY_REJECT (wire value 0).
    ConflictStrategy conflict_strategy = 1;
    // How long (seconds) to wait in queue before expiring.
    // 0 means use the server default (~1h). Only relevant when
    // conflict_strategy is CONFLICT_STRATEGY_QUEUE.
    int32 queue_timeout_seconds = 2;
}

message PowerOnRackRequest {
    OperationTargetSpec target_spec = 1;  // Flexible targeting: rack(s) with optional type filter, or specific components
    string description = 2;               // optional task description
    optional QueueOptions queue_options = 3;
    optional UUID rule_id = 4;            // optional: override rule resolution with a specific rule
}

message PowerOffRackRequest {
    OperationTargetSpec target_spec = 1;  // Flexible targeting: rack(s) with optional type filter, or specific components
    bool forced = 2;
    string description = 3;               // optional task description
    optional QueueOptions queue_options = 4;
    optional UUID rule_id = 5;            // optional: override rule resolution with a specific rule
}

message PowerResetRackRequest {
    OperationTargetSpec target_spec = 1;  // Flexible targeting: rack(s) with optional type filter, or specific components
    bool forced = 2;
    string description = 3;               // optional task description
    optional QueueOptions queue_options = 4;
    optional UUID rule_id = 5;            // optional: override rule resolution with a specific rule
}

message BringUpRackRequest {
    OperationTargetSpec target_spec = 1;  // Target racks for bring-up
    string description = 2;               // optional task description
    optional UUID rule_id = 3;            // optional: override rule resolution with a specific rule
}

message IngestRackRequest {
    OperationTargetSpec target_spec = 1;  // Target racks for ingestion
    repeated Filter filters = 2;          // Filter conditions for component queries (e.g. by type, name)
    string description = 3;               // optional task description
    optional UUID rule_id = 4;            // optional: override rule resolution with a specific rule
}

message ListTasksRequest {
    optional UUID rack_id = 1;
    bool active_only = 2;
    optional Pagination pagination = 3;
}

message ListTasksResponse {
    repeated Task tasks = 1;
    int32 total = 2;
}

message GetTasksByIDsRequest {
    repeated UUID task_ids = 1;
}

message GetTasksByIDsResponse {
    repeated Task tasks = 1;
}

message CancelTaskRequest {
    UUID task_id = 1;
}

message CancelTaskResponse {
    Task task = 1;
}

// Version API messages
message VersionRequest {}

message BuildInfo {
    string version = 1;      // e.g., v2025.11.19
    string build_time = 2;   // e.g., 2025-01-27T10:30:00Z
    string git_commit = 3;   // e.g., abc1234
}

// Operation Rules API messages

enum OperationType {
    OPERATION_TYPE_UNKNOWN = 0;
    OPERATION_TYPE_POWER_CONTROL = 1;
    OPERATION_TYPE_FIRMWARE_CONTROL = 2;
}

message OperationRule {
    UUID id = 1;
    string name = 2;
    string description = 3;
    OperationType operation_type = 4;
    string operation_code = 5;  // Specific operation code (e.g., "power_on", "upgrade")
    string rule_definition_json = 6;  // JSON-encoded RuleDefinition
    bool is_default = 7;
    google.protobuf.Timestamp created_at = 8;
    google.protobuf.Timestamp updated_at = 9;
}

message CreateOperationRuleRequest {
    string name = 1;
    string description = 2;
    OperationType operation_type = 3;
    string operation_code = 4;  // Specific operation code (e.g., "power_on", "upgrade")
    string rule_definition_json = 5;  // JSON-encoded RuleDefinition
    bool is_default = 6;
}

message CreateOperationRuleResponse {
    UUID id = 1;
}

message UpdateOperationRuleRequest {
    UUID rule_id = 1;
    optional string name = 2;
    optional string description = 3;
    optional string rule_definition_json = 4;  // JSON-encoded RuleDefinition
    // Note: is_default is NOT updatable here - use SetRuleAsDefault instead
}

message DeleteOperationRuleRequest {
    UUID rule_id = 1;
}

message SetRuleAsDefaultRequest {
    UUID rule_id = 1;
}

message GetOperationRuleRequest {
    UUID rule_id = 1;
}

message ListOperationRulesRequest {
    optional OperationType operation_type = 1;
    optional bool is_default = 2;
    optional int32 offset = 3;
    optional int32 limit = 4;
}

message ListOperationRulesResponse {
    repeated OperationRule rules = 1;
    int32 total_count = 2;
}

// Rack-rule associations API messages

message AssociateRuleWithRackRequest {
    UUID rack_id = 1;
    UUID rule_id = 2;
}

message DisassociateRuleFromRackRequest {
    UUID rack_id = 1;
    OperationType operation_type = 2;
    string operation_code = 3;  // Specific operation code
}

message GetRackRuleAssociationRequest {
    UUID rack_id = 1;
    OperationType operation_type = 2;
    string operation_code = 3;  // Specific operation code
}

message GetRackRuleAssociationResponse {
    UUID rule_id = 1;  // Empty if no association exists
}

message ListRackRuleAssociationsRequest {
    UUID rack_id = 1;
}

message RackRuleAssociation {
    UUID rack_id = 1;
    OperationType operation_type = 2;
    string operation_code = 3;  // Specific operation code (e.g., "power_on", "upgrade")
    UUID rule_id = 4;
    google.protobuf.Timestamp created_at = 5;
    google.protobuf.Timestamp updated_at = 6;
}

message ListRackRuleAssociationsResponse {
    repeated RackRuleAssociation associations = 1;
}

// ─── Task Schedules ─────────────────────────────────────────────────────────

enum ScheduleSpecType {
    SCHEDULE_SPEC_TYPE_UNSPECIFIED = 0;
    SCHEDULE_SPEC_TYPE_INTERVAL    = 1;  // spec is a Go duration string, e.g. "24h"
    SCHEDULE_SPEC_TYPE_CRON        = 2;  // spec is a 5-field cron expression
    SCHEDULE_SPEC_TYPE_ONE_TIME    = 3;  // spec is an RFC3339 timestamp
}

message ScheduleSpec {
    ScheduleSpecType type     = 1;
    string           spec     = 2;
    // IANA timezone for interpreting cron specs (e.g. "America/New_York").
    // Defaults to "UTC". Ignored for interval and one-time specs.
    string           timezone = 3;
}

// OverlapPolicy controls what happens when a schedule fires while the previous
// execution for the same scope is still active.
enum OverlapPolicy {
    OVERLAP_POLICY_UNSPECIFIED = 0;
    OVERLAP_POLICY_SKIP        = 1;  // skip this firing cycle for any scope whose last task is still active
    OVERLAP_POLICY_QUEUE       = 2;  // submit unconditionally; the task manager queues behind the active task
}

// ScheduleConfig groups the scheduling fields shared by multiple request types.
message ScheduleConfig {
    string        name           = 1;
    ScheduleSpec  spec           = 2;
    OverlapPolicy overlap_policy = 3;
}

// TaskSchedule defines when (spec) and what (operation) should run automatically.
// Which racks to target is tracked separately in TaskScheduleScope rows and
// managed via AddTaskScheduleScope / RemoveTaskScheduleScope / ListTaskScheduleScopes.
message TaskSchedule {
    UUID                               id             = 1;
    string                             name           = 2;  // unique, human-readable identifier
    ScheduleSpec                       spec           = 3;  // when to fire (interval, cron, or one-time)
    OverlapPolicy                      overlap_policy = 4;
    bool                               enabled        = 5;  // false = paused (will not fire)
    optional google.protobuf.Timestamp next_run_at    = 6;  // absent for disabled or fully-fired one-time schedules
    optional google.protobuf.Timestamp last_run_at    = 7;  // absent if the schedule has never fired
    google.protobuf.Timestamp          created_at     = 8;
    google.protobuf.Timestamp          updated_at     = 9;
    // operation_type identifies the kind of operation this schedule runs.
    // Values: "POWER_ON", "POWER_OFF", "POWER_RESET", "BRING_UP", "INGEST",
    //         "UPGRADE_FIRMWARE", "DOWNGRADE_FIRMWARE", "ROLLBACK_FIRMWARE".
    string                             operation_type = 10;
    // description is a human-readable summary of the operation and its key parameters,
    // e.g. "Power Reset (forced)" or "Upgrade Firmware to v2.3.1".
    string                             description    = 11;
}

// ScheduledOperation is the shared operation oneof used by
// CreateTaskScheduleRequest and CheckScheduleConflictsRequest.
// Centralising it here means a single proto change adds support for a new
// operation type in both RPCs, and the Go conversion logic lives in one place.
//
// Note: the embedded request messages (e.g. PowerOnRackRequest) may carry a
// description field, but it is ignored when used inside a ScheduledOperation.
// The dispatcher generates task descriptions automatically at fire time in the
// form "<schedule name> — <RFC3339 timestamp>".
message ScheduledOperation {
    oneof operation {
        PowerOnRackRequest      power_on         = 1;
        PowerOffRackRequest     power_off        = 2;
        PowerResetRackRequest   power_reset      = 3;
        BringUpRackRequest      bring_up         = 4;
        UpgradeFirmwareRequest  upgrade_firmware = 5;
        IngestRackRequest       ingest           = 6;
    }
}

// CreateTaskScheduleRequest creates a new TaskSchedule.
// The target_spec on the operation message defines the initial scope; it follows
// the same targeting rules as AddTaskScheduleScope (rack-level or component-level).
// Use AddTaskScheduleScope / RemoveTaskScheduleScope to modify the scope after creation.
message CreateTaskScheduleRequest {
    ScheduleConfig     schedule  = 1;
    ScheduledOperation operation = 2;
}

message GetTaskScheduleRequest {
    UUID id = 1;
}

// ListTaskSchedulesRequest lists TaskSchedules with optional filters.
// Results are ordered by creation time ascending.
message ListTaskSchedulesRequest {
    optional UUID       rack_id      = 1;  // if set, return only schedules with a scope on this rack
    optional Pagination pagination   = 2;
    optional bool       enabled_only = 3;  // if true, return only enabled (non-paused) schedules
}

message ListTaskSchedulesResponse {
    repeated TaskSchedule task_schedules = 1;
    int32                 total          = 2;  // total matching count before pagination
}

// UpdateTaskScheduleRequest updates the scheduling config of an existing
// TaskSchedule. To modify which racks are targeted, use
// AddTaskScheduleScope / RemoveTaskScheduleScope instead.
//
// update_mask is required and controls which fields are written. Supported paths:
//   "schedule.name"           – display name
//   "schedule.overlap_policy" – overlap behaviour
//   "schedule.spec"           – full spec block (type + spec string + next_run_at recomputed)
//   "schedule.spec.timezone"  – timezone only (spec type/string unchanged)
message UpdateTaskScheduleRequest {
    UUID                      id          = 1;
    ScheduleConfig            schedule    = 2;
    google.protobuf.FieldMask update_mask = 3;
}

// PauseTaskScheduleRequest disables a TaskSchedule without deleting it.
// The schedule will not fire until resumed. Has no effect if already paused.
// Returns an error for a one-time schedule that has already fired.
message PauseTaskScheduleRequest {
    UUID id = 1;
}

// ResumeTaskScheduleRequest re-enables a paused TaskSchedule. For interval
// and cron schedules, next_run_at is recomputed from the current time so the
// schedule does not fire immediately. Has no effect if already enabled.
message ResumeTaskScheduleRequest {
    UUID id = 1;
}

// DeleteTaskScheduleRequest permanently deletes a TaskSchedule and all its
// scope entries. In-flight tasks are not cancelled.
message DeleteTaskScheduleRequest {
    UUID id = 1;
}

// TriggerTaskScheduleRequest fires a TaskSchedule immediately, regardless of
// next_run_at or enabled state. The overlap policy is not consulted — all
// scopes are submitted unconditionally. Returns an error for a one-time
// schedule that has already fired.
message TriggerTaskScheduleRequest {
    UUID id = 1;
}

// TaskScheduleScope represents one rack target in a schedule's scope.
// Each scope entry causes one task to be submitted per schedule firing.
// last_task_id tracks the task produced for this rack by the most recent firing;
// the dispatcher uses it for the overlap check. Absent if no task has fired yet
// for this scope (e.g. a newly added rack).
message TaskScheduleScope {
    UUID                      id           = 1;
    UUID                      schedule_id  = 2;
    UUID                      rack_id      = 3;
    // component_filter restricts which components in the rack are targeted.
    // Omit to target all components in the rack.
    oneof component_filter {
        // types filters by component type (e.g. COMPUTE, POWERSHELF).
        ComponentTypes   types      = 4;
        // components targets specific components by UUID or external reference.
        ComponentTargets components = 5;
    }
    UUID                      last_task_id = 6;  // absent until the first firing for this scope
    google.protobuf.Timestamp created_at   = 7;
}

// AddTaskScheduleScopeRequest adds one or more scope entries to a schedule.
// Supports rack-level targeting (with optional component-type filter) and
// component-level targeting (specific components by UUID or external reference).
// For component-level targets the server resolves which rack each component
// belongs to and groups them into per-rack scope entries automatically.
// Racks already present in the scope have their component filter merged with the
// incoming filter rather than erroring; racks not yet present are added.
// Existing racks are never removed — use UpdateTaskScheduleScope for replace semantics.
message AddTaskScheduleScopeRequest {
    UUID                schedule_id = 1;
    OperationTargetSpec target_spec = 2;
}

// AddTaskScheduleScopeResponse returns the newly created scope entries.
message AddTaskScheduleScopeResponse {
    repeated TaskScheduleScope scopes = 1;
}

// RemoveTaskScheduleScopeRequest removes a single rack scope entry by its scope ID.
// In-flight tasks for that rack are not cancelled.
message RemoveTaskScheduleScopeRequest {
    UUID scope_id = 1;
}

// UpdateTaskScheduleScopeRequest reconciles the schedule's scope against the
// desired target_spec: racks present in desired_scope but not in the current scope
// are added; racks present in the current scope but absent from desired_scope are
// removed; racks present in both have their component_filter updated if changed.
// For component-level targets the server resolves rack membership automatically.
message UpdateTaskScheduleScopeRequest {
    UUID                schedule_id   = 1;
    OperationTargetSpec desired_scope = 2;
}

// UpdateTaskScheduleScopeResponse returns the complete scope after reconciliation.
message UpdateTaskScheduleScopeResponse {
    repeated TaskScheduleScope scopes   = 1;
    int32                      added    = 2;  // number of scope entries added
    int32                      removed  = 3;  // number of scope entries removed
    int32                      updated  = 4;  // number of scope entries with updated component_filter
}

// ListTaskScheduleScopesRequest returns all scope entries for a given schedule.
message ListTaskScheduleScopesRequest {
    UUID schedule_id = 1;
}

message ListTaskScheduleScopesResponse {
    repeated TaskScheduleScope scopes = 1;
}

// CheckScheduleConflictsRequest checks whether a proposed scheduled operation
// would conflict with any existing enabled schedules.
// The operation oneof mirrors CreateTaskScheduleRequest: the target_spec
// embedded in the operation message defines which racks are checked.
//
// This call is advisory and intentionally coarse: it matches on operation
// type and code only, without intersecting component-type filters or explicit
// component UUID lists. As a result it may return false positives — two
// schedules that target disjoint component sets on the same rack will appear
// to conflict here even if their tasks would never collide at runtime.
// Execution-time conflict detection (the task manager's conflict rules) remains
// the authoritative backstop. The caller may proceed even when conflicts are
// returned.
message CheckScheduleConflictsRequest {
    ScheduledOperation operation           = 1;
    // exclude_schedule_id omits a schedule from the conflict check results.
    // Pass the ID of the schedule being updated so its current definition is
    // not returned as a conflict against the proposed replacement operation.
    optional UUID      exclude_schedule_id = 2;
}

// CheckScheduleConflictsResponse lists the existing enabled schedules whose
// operations may conflict with the proposed operation at execution time.
// An empty list means no conflicts were detected.
message CheckScheduleConflictsResponse {
    repeated TaskSchedule conflicts = 1;
}
