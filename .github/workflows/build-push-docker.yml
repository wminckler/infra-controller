name: Build and Push Docker Images

on:
  workflow_call:
    inputs:
      runner:
        description: "Runner type for the build jobs"
        required: false
        default: "ubuntu-latest"
        type: string
      semantic_version:
        description: "Semantic version from VERSION file"
        required: true
        type: string
      short_sha:
        description: "Short SHA for tagging"
        required: true
        type: string
      branch_sha_tag:
        description: "Combined branch name and short SHA tag (branchname-sha)"
        required: true
        type: string
      target_registry:
        description: "Target NVCR registry path"
        required: true
        type: string
      push_enabled:
        description: "Whether to push images to registry"
        required: false
        default: true
        type: boolean
      branch_name:
        description: "Sanitized branch name for image tags"
        required: true
        type: string
      is_main_branch:
        description: "Whether to push 'latest' and version-short-sha tags (only on main) - pass 'true' or 'false' as string"
        required: false
        default: "false"
        type: string
      release_tag:
        description: "Release tag for the build"
        required: false
        default: ""
        type: string
    secrets:
      NVCR_USERNAME:
        description: "NVIDIA Container Registry username (typically '$oauthtoken')"
        required: false
      NVCR_TOKEN:
        description: "NVIDIA Container Registry API token"
        required: false

# Required secrets (must be configured in GitHub repository settings):
# - NVCR_USERNAME: NVIDIA Container Registry username (typically '$oauthtoken')
# - NVCR_TOKEN: NVIDIA Container Registry API token
#
# To configure secrets:
# 1. Go to your GitHub repository settings
# 2. Navigate to Secrets and variables > Actions
# 3. Click "New repository secret"
# 4. Add the following secrets:
#    - Name: NVCR_USERNAME
#      Value: $oauthtoken (or your NVCR username)
#    - Name: NVCR_TOKEN
#      Value: Your NVIDIA NGC API token (get from https://ngc.nvidia.com/)

jobs:
  # Build and push nico-rest-api
  build-nico-rest-api:
    name: Build nico-rest-api
    uses: ./.github/workflows/build-push-service.yml
    with:
      runner: ${{ inputs.runner }}
      service_name: nico-rest-api
      binary_name: api
      binary_path: /app/api
      dockerfile: ./docker/production/Dockerfile.nico-rest-api
      semantic_version: ${{ inputs.semantic_version }}
      short_sha: ${{ inputs.short_sha }}
      branch_sha_tag: ${{ inputs.branch_sha_tag }}
      target_registry: ${{ inputs.target_registry }}
      push_enabled: ${{ inputs.push_enabled }}
      is_main_branch: ${{ inputs.is_main_branch }}
      release_tag: ${{ inputs.release_tag }}
    secrets: inherit

  # Build and push nico-rest-db
  build-nico-rest-db:
    name: Build nico-rest-db
    uses: ./.github/workflows/build-push-service.yml
    with:
      runner: ${{ inputs.runner }}
      service_name: nico-rest-db
      binary_name: migrations
      binary_path: /app/migrations
      dockerfile: ./docker/production/Dockerfile.nico-rest-db
      semantic_version: ${{ inputs.semantic_version }}
      short_sha: ${{ inputs.short_sha }}
      branch_sha_tag: ${{ inputs.branch_sha_tag }}
      target_registry: ${{ inputs.target_registry }}
      push_enabled: ${{ inputs.push_enabled }}
      is_main_branch: ${{ inputs.is_main_branch }}
      release_tag: ${{ inputs.release_tag }}
    secrets: inherit

  # Build and push nico-rest-site-manager
  build-nico-rest-site-manager:
    name: Build nico-rest-site-manager
    uses: ./.github/workflows/build-push-service.yml
    with:
      runner: ${{ inputs.runner }}
      service_name: nico-rest-site-manager
      binary_name: sitemgr
      binary_path: /app/sitemgr
      dockerfile: ./docker/production/Dockerfile.nico-rest-site-manager
      semantic_version: ${{ inputs.semantic_version }}
      short_sha: ${{ inputs.short_sha }}
      branch_sha_tag: ${{ inputs.branch_sha_tag }}
      target_registry: ${{ inputs.target_registry }}
      push_enabled: ${{ inputs.push_enabled }}
      is_main_branch: ${{ inputs.is_main_branch }}
      release_tag: ${{ inputs.release_tag }}
    secrets: inherit

  # Build and push nico-rest-workflow
  build-nico-rest-workflow:
    name: Build nico-rest-workflow
    uses: ./.github/workflows/build-push-service.yml
    with:
      runner: ${{ inputs.runner }}
      service_name: nico-rest-workflow
      binary_name: workflow
      binary_path: /app/workflow
      dockerfile: ./docker/production/Dockerfile.nico-rest-workflow
      semantic_version: ${{ inputs.semantic_version }}
      short_sha: ${{ inputs.short_sha }}
      branch_sha_tag: ${{ inputs.branch_sha_tag }}
      target_registry: ${{ inputs.target_registry }}
      push_enabled: ${{ inputs.push_enabled }}
      is_main_branch: ${{ inputs.is_main_branch }}
      release_tag: ${{ inputs.release_tag }}
    secrets: inherit

  # Build and push nico-rest-site-agent
  build-nico-rest-site-agent:
    name: Build nico-rest-site-agent
    uses: ./.github/workflows/build-push-service.yml
    with:
      runner: ${{ inputs.runner }}
      service_name: nico-rest-site-agent
      binary_name: site-agent
      binary_path: /app/site-agent
      dockerfile: ./docker/production/Dockerfile.nico-rest-site-agent
      semantic_version: ${{ inputs.semantic_version }}
      short_sha: ${{ inputs.short_sha }}
      branch_sha_tag: ${{ inputs.branch_sha_tag }}
      target_registry: ${{ inputs.target_registry }}
      push_enabled: ${{ inputs.push_enabled }}
      is_main_branch: ${{ inputs.is_main_branch }}
      release_tag: ${{ inputs.release_tag }}
    secrets: inherit

  # Build and push nico-rest-cert-manager
  build-nico-rest-cert-manager:
    name: Build nico-rest-cert-manager
    uses: ./.github/workflows/build-push-service.yml
    with:
      runner: ${{ inputs.runner }}
      service_name: nico-rest-cert-manager
      binary_name: credsmgr
      binary_path: /app/credsmgr
      dockerfile: ./docker/production/Dockerfile.nico-rest-cert-manager
      semantic_version: ${{ inputs.semantic_version }}
      short_sha: ${{ inputs.short_sha }}
      branch_sha_tag: ${{ inputs.branch_sha_tag }}
      target_registry: ${{ inputs.target_registry }}
      push_enabled: ${{ inputs.push_enabled }}
      is_main_branch: ${{ inputs.is_main_branch }}
      release_tag: ${{ inputs.release_tag }}
    secrets: inherit

  # Build and push nico-flow
  build-nico-flow:
    name: Build nico-flow
    uses: ./.github/workflows/build-push-service.yml
    with:
      runner: ${{ inputs.runner }}
      service_name: nico-flow
      binary_name: flow
      binary_path: /app/flow
      dockerfile: ./docker/production/Dockerfile.nico-flow
      semantic_version: ${{ inputs.semantic_version }}
      short_sha: ${{ inputs.short_sha }}
      branch_sha_tag: ${{ inputs.branch_sha_tag }}
      target_registry: ${{ inputs.target_registry }}
      push_enabled: ${{ inputs.push_enabled }}
      is_main_branch: ${{ inputs.is_main_branch }}
      release_tag: ${{ inputs.release_tag }}
    secrets: inherit

# Build and push nico-psm
  build-nico-psm:
    name: Build nico-psm
    uses: ./.github/workflows/build-push-service.yml
    with:
      runner: ${{ inputs.runner }}
      service_name: nico-psm
      binary_name: psm
      binary_path: /app/psm
      dockerfile: ./docker/production/Dockerfile.nico-psm
      semantic_version: ${{ inputs.semantic_version }}
      short_sha: ${{ inputs.short_sha }}
      branch_sha_tag: ${{ inputs.branch_sha_tag }}
      target_registry: ${{ inputs.target_registry }}
      push_enabled: ${{ inputs.push_enabled }}
      is_main_branch: ${{ inputs.is_main_branch }}
      release_tag: ${{ inputs.release_tag }}
    secrets: inherit

  # Build and push nico-nsm
  build-nico-nsm:
    name: Build nico-nsm
    uses: ./.github/workflows/build-push-service.yml
    with:
      runner: ${{ inputs.runner }}
      service_name: nico-nsm
      binary_name: nsm
      binary_path: /app/nsm
      dockerfile: ./docker/production/Dockerfile.nico-nsm
      semantic_version: ${{ inputs.semantic_version }}
      short_sha: ${{ inputs.short_sha }}
      branch_sha_tag: ${{ inputs.branch_sha_tag }}
      target_registry: ${{ inputs.target_registry }}
      push_enabled: ${{ inputs.push_enabled }}
      is_main_branch: ${{ inputs.is_main_branch }}
      release_tag: ${{ inputs.release_tag }}
    secrets: inherit

  # Build summary
  build-summary:
    name: Build Summary
    runs-on: ${{ inputs.runner }}
    needs:
      - build-nico-rest-api
      - build-nico-rest-db
      - build-nico-rest-site-manager
      - build-nico-rest-workflow
      - build-nico-rest-site-agent
      - build-nico-rest-cert-manager
      - build-nico-flow
      - build-nico-psm
      - build-nico-nsm
    if: always()
    outputs:
      build_artifacts: ${{ steps.aggregate.outputs.artifacts }}

    steps:
      - name: Generate build summary
        run: |
          echo "# Docker Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Build Information" >> $GITHUB_STEP_SUMMARY
          echo "- **Semantic Version**: \`${{ inputs.semantic_version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Git SHA**: \`${{ inputs.short_sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: \`${{ inputs.branch_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch-SHA Tag**: \`${{ inputs.branch_sha_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Registry**: \`${{ inputs.target_registry }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Push Enabled**: \`${{ inputs.push_enabled }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Is Main Branch**: \`${{ inputs.is_main_branch }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Ref Name**: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Platforms**: \`linux/amd64, linux/arm64\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ inputs.push_enabled }}" = "false" ]; then
            echo "> **Note**: Images were built but NOT pushed to registry (build-only mode)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          echo "## Docker Image Tags" >> $GITHUB_STEP_SUMMARY
          echo "All images tagged with: \`${{ inputs.branch_sha_tag }}\`" >> $GITHUB_STEP_SUMMARY
          if [ "${{ inputs.is_main_branch }}" = "true" ] || [ "${{ github.ref_name }}" = "main" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Main branch additional tags:**" >> $GITHUB_STEP_SUMMARY
            echo "- \`${{ inputs.semantic_version }}\`" >> $GITHUB_STEP_SUMMARY
            echo "- \`latest\`" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ inputs.release_tag }}" != "" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Release tag additional tags:**" >> $GITHUB_STEP_SUMMARY
            echo "- \`${{ inputs.release_tag }}\`" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Images Built" >> $GITHUB_STEP_SUMMARY
          echo "1. \`nico-rest-api:${{ inputs.branch_sha_tag }}\` (amd64 + arm64)" >> $GITHUB_STEP_SUMMARY
          echo "2. \`nico-rest-db:${{ inputs.branch_sha_tag }}\` (amd64 + arm64)" >> $GITHUB_STEP_SUMMARY
          echo "3. \`nico-rest-site-manager:${{ inputs.branch_sha_tag }}\` (amd64 + arm64)" >> $GITHUB_STEP_SUMMARY
          echo "4. \`nico-rest-workflow:${{ inputs.branch_sha_tag }}\` (amd64 + arm64)" >> $GITHUB_STEP_SUMMARY
          echo "5. \`nico-rest-site-agent:${{ inputs.branch_sha_tag }}\` (amd64 + arm64)" >> $GITHUB_STEP_SUMMARY
          echo "6. \`nico-rest-cert-manager:${{ inputs.branch_sha_tag }}\` (amd64 + arm64)" >> $GITHUB_STEP_SUMMARY
          echo "7. \`nico-flow:${{ inputs.branch_sha_tag }}\` (amd64 + arm64)" >> $GITHUB_STEP_SUMMARY
          echo "8. \`nico-psm:${{ inputs.branch_sha_tag }}\` (amd64 + arm64)" >> $GITHUB_STEP_SUMMARY
          echo "9. \`nico-nsm:${{ inputs.branch_sha_tag }}\` (amd64 + arm64)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ inputs.is_main_branch }}" = "true" ] || [ "${{ github.ref_name }}" = "main" ]; then
            echo "## Binary Artifacts Uploaded (Main Branch)" >> $GITHUB_STEP_SUMMARY
            echo "Each binary uploaded for both amd64 and arm64 with versions: \`${{ inputs.semantic_version }}\`, \`latest\`, \`${{ inputs.branch_sha_tag }}\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          echo "## Job Status" >> $GITHUB_STEP_SUMMARY
          echo "- nico-rest-api: \`${{ needs.build-nico-rest-api.result }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- nico-rest-db: \`${{ needs.build-nico-rest-db.result }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- nico-rest-site-manager: \`${{ needs.build-nico-rest-site-manager.result }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- nico-rest-workflow: \`${{ needs.build-nico-rest-workflow.result }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- nico-rest-site-agent: \`${{ needs.build-nico-rest-site-agent.result }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- nico-rest-cert-manager: \`${{ needs.build-nico-rest-cert-manager.result }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- nico-flow: \`${{ needs.build-nico-flow.result }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- nico-psm: \`${{ needs.build-nico-psm.result }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- nico-nsm: \`${{ needs.build-nico-nsm.result }}\`" >> $GITHUB_STEP_SUMMARY

      - name: Aggregate outputs
        id: aggregate
        run: |
          # Create JSON array of artifacts
          # We use a temporary file to handle potential quoting issues and then read it into the variable
          cat <<EOF > artifacts.json
          [
            {
              "service": "nico-rest-api",
              "image_ref": "${{ needs.build-nico-rest-api.outputs.image_ref }}",
              "binary_resource": "${{ needs.build-nico-rest-api.outputs.ngc_binary_resource }}",
              "image_resource": "${{ needs.build-nico-rest-api.outputs.ngc_image_resource }}"
            },
            {
              "service": "nico-rest-db",
              "image_ref": "${{ needs.build-nico-rest-db.outputs.image_ref }}",
              "binary_resource": "${{ needs.build-nico-rest-db.outputs.ngc_binary_resource }}",
              "image_resource": "${{ needs.build-nico-rest-db.outputs.ngc_image_resource }}"
            },
            {
              "service": "nico-rest-site-manager",
              "image_ref": "${{ needs.build-nico-rest-site-manager.outputs.image_ref }}",
              "binary_resource": "${{ needs.build-nico-rest-site-manager.outputs.ngc_binary_resource }}",
              "image_resource": "${{ needs.build-nico-rest-site-manager.outputs.ngc_image_resource }}"
            },
            {
              "service": "nico-rest-workflow",
              "image_ref": "${{ needs.build-nico-rest-workflow.outputs.image_ref }}",
              "binary_resource": "${{ needs.build-nico-rest-workflow.outputs.ngc_binary_resource }}",
              "image_resource": "${{ needs.build-nico-rest-workflow.outputs.ngc_image_resource }}"
            },
            {
              "service": "nico-rest-site-agent",
              "image_ref": "${{ needs.build-nico-rest-site-agent.outputs.image_ref }}",
              "binary_resource": "${{ needs.build-nico-rest-site-agent.outputs.ngc_binary_resource }}",
              "image_resource": "${{ needs.build-nico-rest-site-agent.outputs.ngc_image_resource }}"
            },
            {
              "service": "nico-rest-cert-manager",
              "image_ref": "${{ needs.build-nico-rest-cert-manager.outputs.image_ref }}",
              "binary_resource": "${{ needs.build-nico-rest-cert-manager.outputs.ngc_binary_resource }}",
              "image_resource": "${{ needs.build-nico-rest-cert-manager.outputs.ngc_image_resource }}"
            },
            {
              "service": "nico-flow",
              "image_ref": "${{ needs.build-nico-flow.outputs.image_ref }}",
              "binary_resource": "${{ needs.build-nico-flow.outputs.ngc_binary_resource }}",
              "image_resource": "${{ needs.build-nico-flow.outputs.ngc_image_resource }}"
            },
            {
              "service": "nico-psm",
              "image_ref": "${{ needs.build-nico-psm.outputs.image_ref }}",
              "binary_resource": "${{ needs.build-nico-psm.ngc_binary_resource }}",
              "image_resource": "${{ needs.build-nico-psm.outputs.ngc_image_resource }}"
            },
            {
              "service": "nico-nsm",
              "image_ref": "${{ needs.build-nico-nsm.outputs.image_ref }}",
              "binary_resource": "${{ needs.build-nico-nsm.outputs.ngc_binary_resource }}",
              "image_resource": "${{ needs.build-nico-nsm.outputs.ngc_image_resource }}"
            }
          ]
          EOF

          # Compact JSON and set as output
          ARTIFACTS=$(jq -c . artifacts.json)
          echo "artifacts=$ARTIFACTS" >> $GITHUB_OUTPUT

  # Aggregate the 9 per-service Grype scan artifacts into one summary and
  # post a sticky PR comment on copy-pr-bot pull-request/* branches.
  # Runs in parallel with build-summary; both have if: always() so partial
  # results still surface when individual builds fail.
  security-container-scan-summary:
    name: Container Scan Summary
    runs-on: ${{ inputs.runner }}
    needs:
      - build-nico-rest-api
      - build-nico-rest-db
      - build-nico-rest-site-manager
      - build-nico-rest-workflow
      - build-nico-rest-site-agent
      - build-nico-rest-cert-manager
      - build-nico-flow
      - build-nico-psm
      - build-nico-nsm
    if: always()
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: NVIDIA/dsx-github-actions/.github/actions/security-container-scan-aggregate@739847ddf00fda38916504ef84e1f504eac3158f
        with:
          post-pr-comment: 'true'
